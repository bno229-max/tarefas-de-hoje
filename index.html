<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kivo Notes</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f7d05c">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-paper: #fcf6eb;
            --line-color: #d3c4b7;
            --margin-line: #e0c8b8;
            --text-dark: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #dcdcdc; 
            display: flex;
            justify-content: center;
            font-family: 'Patrick Hand', cursive;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none; 
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            background-color: var(--bg-paper);
            background-image: 
                linear-gradient(90deg, transparent 40px, var(--margin-line) 40px, var(--margin-line) 42px, transparent 42px),
                repeating-linear-gradient(transparent, transparent 39px, var(--line-color) 39px, var(--line-color) 40px);
            background-attachment: local;
            padding: 20px 15px 95px 55px; 
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }

        header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        
        /* CORREÇÃO DO TÍTULO CONFORME SOLICITADO */
        h1 {
            font-size: 46px;
            color: #fff;
            text-shadow: -1px -1px 0 #333, 1px -1px 0 #333, -1px 1px 0 #333, 1px 1px 0 #333, 3px 3px 0px #f7d05c;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 2px;
        }
        
        /* NOVO SUBTÍTULO EM FONTE MENOR */
        .subtitle {
            font-size: 20px;
            color: var(--text-dark);
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .input-area {
            background: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 25px;
            box-shadow: 3px 3px 0 #d3c4b7;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            border: none;
            font-family: 'Patrick Hand', cursive;
            font-size: 22px;
            outline: none;
            background: transparent;
        }

        .add-btn {
            background: #fff;
            border: 2px solid #333;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            box-shadow: 2px 2px 0 #f7d05c;
            transition: 0.1s;
        }
        .add-btn:active { box-shadow: 0 0 0 transparent; transform: translate(2px, 2px); }

        ul { list-style: none; }
        
        li {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            position: relative;
            touch-action: none;
        }

        li.dragging { opacity: 0.5; transform: scale(0.98); }

        .custom-checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid #333;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 2px 2px 0 #d3c4b7;
        }
        .custom-checkbox.checked::after { content: '✘'; font-size: 24px; color: #333; }

        .task-pill {
            flex: 1;
            padding: 8px 15px;
            border-radius: 25px;
            color: #333;
            border: 2px solid transparent;
            cursor: grab;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.1s;
        }

        .cat-fazer { background-color: #e28a55; color: white;} 
        .cat-agendar { background-color: #f4bc4c; } 
        .cat-delegar { background-color: #85c1e9; } 
        .cat-deletas { background-color: #bb8fce; color: white;} /* Lilás para a Lixeira */

        .task-title { font-size: 20px; line-height: 1.1; pointer-events: none; }
        .task-time { font-size: 13px; opacity: 0.7; font-family: sans-serif; margin-top: 4px; pointer-events: none; }

        .completed .task-pill {
            background-color: transparent !important;
            border-color: #999;
            opacity: 0.6;
            color: #333;
            cursor: default;
        }
        .completed .task-title { text-decoration: line-through; color: #555; }

        .footer-deco {
            font-family: 'Caveat', cursive;
            font-size: 45px;
            color: #c08480;
            text-align: right;
            margin-top: 30px;
            transform: rotate(-10deg);
            margin-bottom: 30px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 20px);
            max-width: 380px;
            background: #ffffaf; 
            border: 2px solid #333;
            border-radius: 15px;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            box-shadow: 4px 4px 0 #333;
            z-index: 900;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
        }

        .nav-icon { font-size: 20px; margin-bottom: 2px; }
        .nav-label { font-size: 13px; font-weight: bold; }

        .nav-item.active {
            transform: scale(1.1);
            color: #e28a55;
            text-shadow: 1px 1px 0px #333;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-paper);
            width: 100%;
            max-width: 360px;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #333;
            box-shadow: 4px 4px 0 #333;
            position: relative;
            background-image: repeating-linear-gradient(transparent, transparent 39px, var(--line-color) 39px, var(--line-color) 40px);
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-title { font-size: 26px; margin-bottom: 15px; color: #333; border-bottom: 2px dashed #ccc; padding-bottom: 3px; }
        .sub-items-list { margin-top: 15px; max-height: 220px; overflow-y: auto; }
        .sub-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 20px; }
        .sub-item.completed span { text-decoration: line-through; opacity: 0.5; }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: white;
            border: 2px solid #333;
            border-radius: 10px;
            font-family: 'Patrick Hand', cursive;
            font-size: 18px;
            cursor: pointer;
            text-align: left;
            box-shadow: 2px 2px 0 #333;
        }
        .menu-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 #333; }
        .btn-danger-menu { color: #ff4757; border-color: #ff4757; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <header>
            <h1>Kivo Notes</h1>
            <p class="subtitle">Notas e Tarefas</p>
        </header>

        <div class="input-area">
            <input type="text" id="titulo" placeholder="Crie uma nova tarefa...">
            <button class="add-btn" onclick="saveTask()">+</button>
        </div>

        <ul id="taskList"></ul>

        <div class="footer-deco">yes!</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="tab-fazer" onclick="switchTab('fazer')">
            <span class="nav-icon">🔥</span>
            <span class="nav-label">Fazer Agora</span>
        </div>
        <div class="nav-item" id="tab-agendar" onclick="switchTab('agendar')">
            <span class="nav-icon">🕒</span>
            <span class="nav-label">Agendar</span>
        </div>
        <div class="nav-item" id="tab-delegar" onclick="switchTab('delegar')">
            <span class="nav-icon">👥</span>
            <span class="nav-label">Delegar</span>
        </div>
        <div class="nav-item" id="tab-deletas" onclick="switchTab('deletas')">
            <span class="nav-icon">🗑️</span>
            <span class="nav-label">Deletas</span>
        </div>
    </div>

    <div class="modal-overlay" id="subItemModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">✖</span>
            <h2 class="modal-title" id="modalTaskTitle">Itens</h2>
            
            <div class="input-area" style="margin-bottom: 15px; box-shadow: none;">
                <input type="text" id="subItemInput" placeholder="Adicionar sub-item...">
                <button class="add-btn" onclick="addSubItem()">+</button>
            </div>

            <ul class="sub-items-list" id="subItemsList"></ul>
        </div>
    </div>

    <div class="modal-overlay" id="actionMenuModal">
        <div class="modal-content" style="background-image: none;">
            <span class="close-modal" onclick="closeActionMenu()">✖</span>
            <h2 class="modal-title" id="actionMenuTitle">Opções da Tarefa</h2>
            
            <button class="menu-btn" onclick="shareOnWhatsApp()">📤 Compartilhar no WhatsApp</button>
            <button class="menu-btn btn-danger-menu" id="deleteBtn" onclick="deleteCurrentTask()">🗑️ Excluir</button>
        </div>
    </div>

    <script>
        // Nova versão do banco local para limpar os testes anteriores
        let tasks = JSON.parse(localStorage.getItem('kivoNotesDataV2')) || [];
        
        let currentTaskId = null;
        let activeQuadrant = 'fazer'; 
        
        let longPressTimer;
        let didLongPress = false;

        function persistData() {
            localStorage.setItem('kivoNotesDataV2', JSON.stringify(tasks));
        }

        function formatarData() {
            const data = new Date();
            return `${data.getDate().toString().padStart(2, '0')}/${(data.getMonth() + 1).toString().padStart(2, '0')} às ${data.getHours().toString().padStart(2, '0')}:${data.getMinutes().toString().padStart(2, '0')}`;
        }

        function switchTab(quadrant) {
            activeQuadrant = quadrant;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${quadrant}`).classList.add('active');
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            const filteredTasks = tasks.filter(t => t.quadrante === activeQuadrant);

            filteredTasks.forEach((task) => {
                const li = document.createElement('li');
                // Se estiver na aba de deletadas, desativa o arrastar e soltar
                li.setAttribute('draggable', (task.concluida || activeQuadrant === 'deletas') ? 'false' : 'true');
                li.setAttribute('data-id', task.id);
                
                const timeText = task.concluida ? `✓ Concluído: ${task.data_conclusao}` : `✎ Criado: ${task.data_criacao}`;

                li.innerHTML = `
                    <div class="custom-checkbox ${task.concluida ? 'checked' : ''}" onclick="toggleStatus('${task.id}')"></div>
                    <div class="task-pill cat-${task.quadrante}" 
                         onmousedown="startPress(event, '${task.id}')" 
                         onmouseup="cancelPress()" 
                         onmouseleave="cancelPress()"
                         ontouchstart="startPress(event, '${task.id}')" 
                         ontouchend="cancelPress()" 
                         ontouchmove="cancelPress()"
                         onclick="handlePillClick(event, '${task.id}')">
                        <span class="task-title">${task.titulo}</span>
                        <div class="task-time">${timeText}</div>
                    </div>
                `;
                
                if(task.concluida) li.classList.add('completed');
                list.appendChild(li);
                
                if(!task.concluida && activeQuadrant !== 'deletas') setupDragAndDropEvents(li);
            });
        }

        function saveTask() {
            const titulo = document.getElementById('titulo').value.trim();
            if (titulo === '') return;

            // Se o usuário criar uma nota estando dentro da lixeira, força ela a ir pro "Fazer Agora"
            const spawnQuadrant = activeQuadrant === 'deletas' ? 'fazer' : activeQuadrant;

            const newTask = {
                id: Date.now().toString(),
                titulo: titulo,
                concluida: false,
                subItems: [],
                data_criacao: formatarData(),
                data_conclusao: null,
                quadrante: spawnQuadrant 
            };

            tasks.unshift(newTask);
            document.getElementById('titulo').value = '';
            
            if(activeQuadrant === 'deletas') switchTab('fazer');
            else { persistData(); renderTasks(); }
        }

        function toggleStatus(id) {
            let turnedOn = false; 
            
            tasks = tasks.map(task => {
                if (task.id === id) {
                    const isNowCompleted = !task.concluida;
                    if (isNowCompleted) turnedOn = true; 
                    return { 
                        ...task, 
                        concluida: isNowCompleted,
                        data_conclusao: isNowCompleted ? formatarData() : null
                    };
                }
                return task;
            });

            tasks.sort((a, b) => a.concluida - b.concluida);

            persistData();
            renderTasks();
            
            if (turnedOn) celebrate();
        }

        function startPress(e, id) {
            didLongPress = false;
            longPressTimer = setTimeout(() => {
                didLongPress = true;
                if (navigator.vibrate) navigator.vibrate(50);
                openActionMenu(id);
            }, 600); 
        }

        function cancelPress() { clearTimeout(longPressTimer); }

        function handlePillClick(e, id) {
            if (didLongPress) {
                e.preventDefault();
                return;
            }
            openModal(id);
        }

        function openActionMenu(id) {
            currentTaskId = id;
            const task = tasks.find(t => t.id === id);
            document.getElementById('actionMenuTitle').innerText = task.titulo;
            
            // LÓGICA DINÂMICA DE EXCLUSÃO DA LIXEIRA
            const deleteBtn = document.getElementById('deleteBtn');
            if (task.quadrante === 'deletas') {
                deleteBtn.innerText = '🗑️ Excluir Permanentemente';
            } else {
                deleteBtn.innerText = '🗑️ Mover para Deletas';
            }

            document.getElementById('actionMenuModal').style.display = 'flex';
        }

        function closeActionMenu() {
            document.getElementById('actionMenuModal').style.display = 'none';
            currentTaskId = null;
        }

        function shareOnWhatsApp() {
            const task = tasks.find(t => t.id === currentTaskId);
            if (!task) return;

            const labels = { fazer: '🔥 FAZER AGORA', agendar: '🕒 AGENDAR', delegar: '👥 DELEGAR', deletas: '🗑️ DELETAS' };
            
            let mensagem = `*Kivo Notes - ${labels[task.quadrante]}*\n`;
            mensagem += `📌 *Lista: ${task.titulo}*\n`;
            mensagem += `_Status: ${task.concluida ? 'Concluída' : 'Em andamento'}_ \n\n`;

            if (task.subItems && task.subItems.length > 0) {
                task.subItems.forEach(item => {
                    mensagem += item.concluido ? `✅ ~${item.texto}~\n` : `⬜ ${item.texto}\n`;
                });
            } else {
                mensagem += `_(Nenhum sub-item adicionado)_`;
            }

            const urlWhatsApp = `https://wa.me/?text=${encodeURIComponent(mensagem)}`;
            window.open(urlWhatsApp, '_blank');
            closeActionMenu();
        }

        // ALTERAÇÃO DO FLUXO DE EXCLUSÃO CONFORME ENUNCIADO (LIXEIRA FLUIDA)
        function deleteCurrentTask() {
            const task = tasks.find(t => t.id === currentTaskId);
            if (!task) return;

            if (task.quadrante !== 'deletas') {
                // Se veio de outra aba, apenas MOVIMENTA para a aba Deletas
                task.quadrante = 'deletas';
                persistData();
                renderTasks();
                closeActionMenu();
            } else {
                // Se já estava na lixeira, aí sim DETONA permanentemente
                if (confirm('Tem certeza que deseja apagar permanentemente do dispositivo? Esta ação é irreversível.')) {
                    tasks = tasks.filter(t => t.id !== currentTaskId);
                    persistData();
                    renderTasks();
                    closeActionMenu();
                }
            }
        }

        function celebrate() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let pieces = [];
            const colors = ['#f7d05c', '#f49c5e', '#f2a297', '#e28a55', '#4A90E2', '#a2d9ce', '#bb8fce'];

            for (let i = 0; i < 100; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    rotation: Math.random() * 360,
                    speed: 4 + Math.random() * 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    width: 8 + Math.random() * 6,
                    height: 15 + Math.random() * 5
                });
            }

            function update() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;

                pieces.forEach(p => {
                    p.y += p.speed;
                    p.rotation += 2;
                    if (p.y < canvas.height) alive = true;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.width/2, -p.height/2, p.width, p.height);
                    ctx.restore();
                });

                if (alive) requestAnimationFrame(update);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            update();
        }

        let dragSrcEl = null;

        function setupDragAndDropEvents(el) {
            el.addEventListener('dragstart', handleDragStart);
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('drop', handleDrop);
            el.addEventListener('dragend', handleDragEnd);

            el.addEventListener('touchstart', handleTouchStart, {passive: false});
            el.addEventListener('touchmove', handleTouchMove, {passive: false});
            el.addEventListener('touchend', handleTouchEnd);
        }

        function handleDragStart(e) {
            this.classList.add('dragging');
            dragSrcEl = this;
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); return false; }

        function handleDrop(e) {
            if (e.stopPropagation) e.stopPropagation();
            if (dragSrcEl !== this) {
                reorderArray(dragSrcEl.getAttribute('data-id'), this.getAttribute('data-id'));
            }
            return false;
        }

        function handleDragEnd() { this.classList.remove('dragging'); renderTasks(); }

        let touchStartEl = null;
        function handleTouchStart(e) { touchStartEl = this; this.classList.add('dragging'); }

        function handleTouchMove(e) {
            e.preventDefault(); 
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const liTarget = target ? target.closest('li') : null;

            if (liTarget && liTarget !== touchStartEl && !liTarget.classList.contains('completed') && liTarget.getAttribute('data-id')) {
                reorderArray(touchStartEl.getAttribute('data-id'), liTarget.getAttribute('data-id'));
                touchStartEl.classList.remove('dragging');
                touchStartEl = liTarget;
                touchStartEl.classList.add('dragging');
            }
        }

        function handleTouchEnd() { if (touchStartEl) touchStartEl.classList.remove('dragging'); renderTasks(); }

        function reorderArray(srcId, targetId) {
            const srcIndex = tasks.findIndex(t => t.id === srcId);
            const targetIndex = tasks.findIndex(t => t.id === targetId);
            const [removed] = tasks.splice(srcIndex, 1);
            tasks.splice(targetIndex, 0, removed);
            persistData();
        }

        function openModal(taskId) {
            currentTaskId = taskId;
            const task = tasks.find(t => t.id === taskId);
            document.getElementById('modalTaskTitle').innerText = task.titulo;
            document.getElementById('subItemModal').style.display = 'flex';
            renderSubItems();
        }

        function closeModal() {
            document.getElementById('subItemModal').style.display = 'none';
            currentTaskId = null;
            renderTasks(); 
        }

        function addSubItem() {
            const input = document.getElementById('subItemInput');
            const texto = input.value.trim();
            if (texto !== '' && currentTaskId) {
                const task = tasks.find(t => t.id === currentTaskId);
                task.subItems.push({ id: Date.now().toString(), texto: texto, concluido: false });
                input.value = '';
                persistData();
                renderSubItems();
            }
        }

        function renderSubItems() {
            if (!currentTaskId) return;
            const task = tasks.find(t => t.id === currentTaskId);
            const list = document.getElementById('subItemsList');
            list.innerHTML = '';

            task.subItems.forEach(item => {
                const li = document.createElement('li');
                li.className = `sub-item ${item.concluido ? 'completed' : ''}`;
                li.innerHTML = `
                    <div class="custom-checkbox ${item.concluido ? 'checked' : ''}" style="width: 22px; height: 22px;" onclick="toggleSubItem('${item.id}')"></div>
                    <span>${item.texto}</span>
                `;
                list.appendChild(li);
            });
        }

        function toggleSubItem(subItemId) {
            const task = tasks.find(t => t.id === currentTaskId);
            const item = task.subItems.find(i => i.id === subItemId);
            item.concluido = !item.concluido;
            persistData();
            renderSubItems();
        }

        document.getElementById('titulo').addEventListener('keypress', e => { if (e.key === 'Enter') saveTask(); });
        document.getElementById('subItemInput').addEventListener('keypress', e => { if (e.key === 'Enter') addSubItem(); });

        renderTasks();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Versão v7.1 para forçar o navegador a atualizar o cache local do PWA
                navigator.serviceWorker.register('./sw.js?v7.1').catch(err => console.log("Erro sw:", err));
            });
        }
    </script>
</body>
</html>
