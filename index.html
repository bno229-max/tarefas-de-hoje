<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kivo Notes</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f7d05c">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            /* Variáveis Modo Claro */
            --bg-body: #dcdcdc;
            --bg-paper: #fcf6eb;
            --line-color: #d3c4b7;
            --text-dark: #333;
            --shadow-color: #333;
            --modal-input-bg: #fff;
            --whatsapp-color: #25D366;
            --note-text: #333; 
        }

        [data-theme="dark"] {
            /* Variáveis Modo Escuro */
            --bg-body: #121212;
            --bg-paper: #2a2a2a;
            --line-color: #444;
            --text-dark: #f5f5f5;
            --shadow-color: #000;
            --modal-input-bg: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body); 
            display: flex;
            justify-content: center;
            font-family: 'Patrick Hand', cursive;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none; 
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            background-color: var(--bg-paper);
            background-image: repeating-linear-gradient(transparent, transparent 39px, var(--line-color) 39px, var(--line-color) 40px);
            background-attachment: local;
            padding: 20px 20px 120px 20px; 
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 26px;
            cursor: pointer;
            background: none;
            border: none;
            outline: none;
            transition: transform 0.2s;
        }
        .theme-toggle:active { transform: scale(0.8); }

        header { text-align: center; margin-bottom: 20px; margin-top: 10px; }
        
        h1 {
            font-size: 46px;
            color: #fff;
            text-shadow: -1px -1px 0 var(--shadow-color), 1px -1px 0 var(--shadow-color), -1px 1px 0 var(--shadow-color), 1px 1px 0 var(--shadow-color), 3px 3px 0px #f7d05c;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 2px;
        }
        
        .subtitle { font-size: 20px; color: var(--text-dark); opacity: 0.7; letter-spacing: 1px; }

        .tabs-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .tab-btn {
            background: var(--bg-paper); 
            color: var(--text-dark);
            border: 2px solid var(--text-dark); 
            padding: 5px 15px; 
            font-family: inherit;
            font-size: 18px; 
            cursor: pointer; 
            border-radius: 20px; 
            box-shadow: 2px 2px 0 var(--shadow-color); 
            transition: all 0.1s;
        }
        .tab-btn.active { 
            background: #f7d05c; 
            color: #333; 
            transform: translate(1px, 1px); 
            box-shadow: 1px 1px 0 var(--shadow-color); 
        }

        ul { list-style: none; }
        
        .note-card {
            border: 2px solid var(--text-dark); 
            border-radius: 10px; 
            padding: 12px; 
            margin-bottom: 25px;
            box-shadow: 3px 3px 0 var(--shadow-color); 
            position: relative; 
            background: #fff7d6;
            color: var(--note-text); 
        }
        
        .sortable-ghost { opacity: 0.4; background-color: #f0f0f0 !important; }

        .priority-badge {
            display: inline-block; padding: 1px 8px; border: 2px solid var(--note-text);
            border-radius: 5px; font-size: 14px; font-weight: bold; margin-bottom: 6px;
        }
        .p-max { background: #ff6b6b; color: #fff; }
        .p-med { background: #f7d05c; color: #333; }
        .p-min { background: #54a0ff; color: #fff; }

        .drag-handle {
            position: absolute; top: 10px; right: 10px; font-size: 24px; color: var(--note-text);
            cursor: grab; padding: 5px 10px; background: rgba(255,255,255,0.5);
            border: 2px solid var(--note-text); border-radius: 8px; touch-action: none;
        }
        .drag-handle:active { cursor: grabbing; background: #f7d05c; }

        .note-theme { font-size: 24px; font-weight: bold; margin-bottom: 8px; border-bottom: 1px dashed rgba(0,0,0,0.2); padding-bottom: 4px; padding-right: 45px; }

        .subtasks-list { margin-left: 5px; margin-top: 5px; }
        .subtask-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 20px; }
        .subtask-item.done span { text-decoration: line-through; opacity: 0.5; }

        .custom-checkbox {
            width: 22px; height: 22px; border: 2px solid var(--note-text); background: #fff;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            flex-shrink: 0; box-shadow: 1px 1px 0 var(--note-text);
        }
        .custom-checkbox.checked::after { content: '✘'; font-size: 18px; color: var(--note-text); }

        .time-box { font-size: 13px; opacity: 0.6; font-family: sans-serif; margin-top: 5px; color: var(--note-text); }

        .note-actions { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 12px; padding-top: 8px; border-top: 1px dashed rgba(0,0,0,0.2); }
        .action-btn { cursor: pointer; font-size: 18px; padding: 4px 8px; background: rgba(255,255,255,0.6); border: 2px solid var(--note-text); border-radius: 6px; color: var(--note-text); }
        .action-btn:active { transform: scale(0.9); }
        .btn-wa { font-weight: bold; }
        .icon-seen { font-size: 14px; font-family: sans-serif; opacity: 0.7; margin-right: auto; }

        .floating-add-btn { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 60px; height: 60px; background: #f7d05c; border: 2px solid var(--shadow-color); 
            border-radius: 50%; font-size: 36px; font-weight: bold; color: #333; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            box-shadow: 4px 4px 0 var(--shadow-color); z-index: 1000; 
        }
        .floating-add-btn:active { transform: translate(-50%, 2px); box-shadow: 2px 2px 0 var(--shadow-color); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--bg-paper); width: 100%; max-width: 360px; border-radius: 15px; padding: 20px; border: 2px solid var(--text-dark); box-shadow: 4px 4px 0 var(--shadow-color); position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; font-weight: bold; color: var(--text-dark); }
        .modal-title { color: var(--text-dark); }

        .color-picker { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--text-dark); cursor: pointer; }
        .color-swatch.selected { transform: scale(1.2); border-width: 3px; }

        .input-box { width: 100%; background: var(--modal-input-bg); color: var(--text-dark); border: 2px solid var(--text-dark); border-radius: 8px; padding: 10px; font-family: inherit; font-size: 20px; outline: none; margin-bottom: 12px; }
        
        .subtasks-setup-area { max-height: 120px; overflow-y: auto; margin-bottom: 15px; color: var(--text-dark); }
        
        /* Estilo da linha de subtítulo dentro do modal */
        .setup-subtask-item { 
            font-size: 18px; 
            padding: 4px 0; 
            border-bottom: 1px dashed var(--line-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .delete-temp-btn { cursor: pointer; color: #ff6b6b; font-weight: bold; margin-left: 10px; padding: 0 5px; }

        .modal-btn { width: 100%; padding: 12px; background: #f7d05c; color: #333; border: 2px solid var(--text-dark); border-radius: 8px; font-family: inherit; font-size: 20px; cursor: pointer; box-shadow: 2px 2px 0 var(--shadow-color); }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .shared-mode-tag { background: #3498db; color: white; padding: 4px; border-radius: 5px; text-align: center; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <button class="theme-toggle" id="themeToggleBtn" title="Alternar Modo Escuro">🌙</button>

        <header>
            <h1>Kivo Notes</h1>
            <p class="subtitle">Notas e Tarefas</p>
        </header>

        <div id="sharedBadge" class="shared-mode-tag" style="display: none;">🔗 Modo Compartilhado Ativo</div>

        <div class="tabs-container" id="tabsBlock">
            <button class="tab-btn active" id="btnAtivas">Ativas</button>
            <button class="tab-btn" id="btnConcluidas">Concluídas</button>
        </div>

        <ul id="noteList"></ul>
    </div>

    <button class="floating-add-btn" id="openCreateBtn">+</button>

    <div class="modal-overlay" id="noteModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn">✖</span>
            <h2 class="modal-title" id="modalTitle">Nova Nota</h2>
            
            <div class="color-picker" id="colorPicker">
                <div class="color-swatch selected" style="background: #fff7d6" data-color="#fff7d6"></div>
                <div class="color-swatch" style="background: #d6eaf8" data-color="#d6eaf8"></div>
                <div class="color-swatch" style="background: #d4efdf" data-color="#d4efdf"></div>
                <div class="color-swatch" style="background: #fadbd8" data-color="#fadbd8"></div>
                <div class="color-swatch" style="background: #ebdef0" data-color="#ebdef0"></div>
            </div>

            <input type="text" id="themeInput" class="input-box" placeholder="Tema da Nota...">
            
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="subtaskInput" class="input-box" style="margin-bottom: 0;" placeholder="Adicionar Subtítulo...">
                <button class="modal-btn" style="width: 50px; padding: 0;" id="addSubtaskBtn">+</button>
            </div>

            <div class="subtasks-setup-area" id="subtasksSetupList"></div>
            
            <button class="modal-btn" id="saveNoteBtn">Salvar Nota</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query, where } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // CHAVES REAIS DO PROJETO KIVO-CB6F4
        const firebaseConfig = {
            apiKey: "AIzaSyBboZMGObuLf8yWyRByK2c0dHTgY3nPMuc",
            authDomain: "kivo-cb6f4.firebaseapp.com",
            projectId: "kivo-cb6f4",
            storageBucket: "kivo-cb6f4.firebasestorage.app",
            messagingSenderId: "1095899910476",
            appId: "1:1095899910476:web:b5ba53d2c5a76334ce3fe9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const notesCol = collection(db, "kivo_tasks");

        let currentNotes = [];
        let tempSubtasks = [];
        let editingNoteId = null;
        let isSharedMode = false;
        let sharedNoteId = null;
        let selectedColor = "#fff7d6";
        let activeTab = "ativas"; 
        let sortableInstance = null;
        let loggedUser = null;

        // --- MODO ESCURO / CLARO ---
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        let isDarkMode = localStorage.getItem('kivoTheme') === 'dark';

        function applyTheme() {
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
                themeToggleBtn.innerText = '☀️';
            } else {
                document.body.removeAttribute('data-theme');
                themeToggleBtn.innerText = '🌙';
            }
        }
        applyTheme();

        themeToggleBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('kivoTheme', isDarkMode ? 'dark' : 'light');
            applyTheme();
        });

        // --- MODO COMPARTILHADO ---
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('noteId')) {
            isSharedMode = true;
            sharedNoteId = urlParams.get('noteId');
            document.getElementById('sharedBadge').style.display = 'block';
            document.getElementById('openCreateBtn').style.display = 'none';
            document.getElementById('tabsBlock').style.display = 'none';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loggedUser = user;
                initApp();
            } else {
                signInAnonymously(auth).catch(err => {
                    console.error("Erro auth:", err);
                    alert("Atenção: A Autenticação Anônima não está ativada no seu Firebase! Vá no console e ative.");
                });
            }
        });

        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedColor = e.target.getAttribute('data-color');
            });
        });

        document.getElementById('btnAtivas').onclick = () => {
            activeTab = "ativas";
            document.getElementById('btnAtivas').classList.add('active');
            document.getElementById('btnConcluidas').classList.remove('active');
            render();
        };
        document.getElementById('btnConcluidas').onclick = () => {
            activeTab = "concluidas";
            document.getElementById('btnConcluidas').classList.add('active');
            document.getElementById('btnAtivas').classList.remove('active');
            render();
        };

        function initApp() {
            if (isSharedMode) {
                const docRef = doc(db, "kivo_tasks", sharedNoteId);
                updateDoc(docRef, { seen: true }).catch(e => console.log("Erro de leitura:", e));
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        currentNotes = [{ id: snap.id, ...snap.data() }];
                        render();
                    }
                });
            } else {
                if(!loggedUser) return;
                
                const q = query(notesCol, where("ownerId", "==", loggedUser.uid));
                onSnapshot(q, (snapshot) => {
                    currentNotes = [];
                    snapshot.forEach(doc => currentNotes.push({ id: doc.id, ...doc.data() }));
                    currentNotes.sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
                    render();
                }, (error) => {
                    console.log("Erro ao carregar:", error);
                    alert("Erro ao ler do banco de dados: " + error.message);
                });
            }
        }

        function formatarData() {
            const data = new Date();
            return `${data.getDate().toString().padStart(2, '0')}/${(data.getMonth() + 1).toString().padStart(2, '0')} às ${data.getHours().toString().padStart(2, '0')}:${data.getMinutes().toString().padStart(2, '0')}`;
        }

        function render() {
            const list = document.getElementById('noteList');
            list.innerHTML = '';

            let filtered = currentNotes;
            if (!isSharedMode) {
                filtered = currentNotes.filter(note => activeTab === "concluidas" ? note.concluida === true : !note.concluida);
            }

            filtered.forEach((note, index) => {
                const li = document.createElement('li');
                li.className = 'note-card';
                li.style.backgroundColor = note.color || '#fff7d6';
                li.setAttribute('data-id', note.id);

                let priorityHtml = '';
                if (activeTab === "ativas" && !isSharedMode) {
                    if (index === 0) priorityHtml = `<span class="priority-badge p-max">🔴 1º Prioridade Máxima</span>`;
                    else if (index === 1) priorityHtml = `<span class="priority-badge p-med">🟡 2º Prioridade Média</span>`;
                    else if (index === 2) priorityHtml = `<span class="priority-badge p-min">🔵 3º Prioridade Baixa</span>`;
                }

                const seenHtml = (note.seen && !isSharedMode) ? `<span class="icon-seen">👁️ visto</span>` : '';

                let subtasksHtml = '';
                if (note.subItems && note.subItems.length > 0) {
                    note.subItems.forEach((sub, subIdx) => {
                        subtasksHtml += `
                            <div class="subtask-item ${sub.concluido ? 'done' : ''}">
                                <div class="custom-checkbox ${sub.concluido ? 'checked' : ''}" data-note-id="${note.id}" data-sub-idx="${subIdx}"></div>
                                <span>${sub.texto}</span>
                            </div>
                        `;
                    });
                }

                let datesHtml = `<div class="time-box">✎ Criado em: ${note.data_criacao || 'Sem data'}</div>`;
                if (note.concluida && note.data_conclusao) {
                    datesHtml += `<div class="time-box" style="color: #1e8449; font-weight: bold;">✓ Concluído em: ${note.data_conclusao}</div>`;
                }

                // REMOVIDA A BOLA VERDE DO BOTÃO, MANTIDO APENAS O AVIÃOZINHO DE PAPEL (✈️)
                li.innerHTML = `
                    ${(activeTab === "ativas" && !isSharedMode) ? '<div class="drag-handle" title="Segure para arrastar">☰</div>' : ''}
                    ${priorityHtml}
                    <div class="note-theme">
                        <span>📌 ${note.theme}</span>
                        ${seenHtml}
                    </div>
                    <div class="subtasks-list">${subtasksHtml}</div>
                    ${datesHtml}
                    <div class="note-actions">
                        <button class="action-btn btn-wa" data-note-id="${note.id}" data-action="share">✈️ WhatsApp</button>
                        <button class="action-btn" data-note-id="${note.id}" data-action="edit">✏️</button>
                        <button class="action-btn" data-note-id="${note.id}" data-action="delete">🗑️</button>
                    </div>
                `;
                list.appendChild(li);
            });

            document.querySelectorAll('.custom-checkbox').forEach(el => {
                el.onclick = (e) => {
                    e.stopPropagation();
                    toggleSubtask(el.getAttribute('data-note-id'), el.getAttribute('data-sub-idx'));
                };
            });

            document.querySelectorAll('.action-btn').forEach(el => {
                el.onclick = (e) => {
                    e.preventDefault(); e.stopPropagation();
                    const id = el.getAttribute('data-note-id');
                    const act = el.getAttribute('data-action');
                    if (act === 'share') shareNote(id);
                    if (act === 'edit') openModal(true, id);
                    if (act === 'delete') deleteNote(id);
                };
            });

            if (activeTab === "ativas" && !isSharedMode) {
                if (sortableInstance) sortableInstance.destroy();
                sortableInstance = new Sortable(list, {
                    handle: '.drag-handle',
                    animation: 200,
                    onEnd: function () {
                        const items = list.querySelectorAll('.note-card');
                        items.forEach((item, newIndex) => {
                            const id = item.getAttribute('data-id');
                            updateDoc(doc(db, "kivo_tasks", id), { ordem: newIndex }).catch(err => console.log("Erro reordenar:", err));
                        });
                    }
                });
            }
        }

        async function toggleSubtask(noteId, index) {
            const note = currentNotes.find(n => n.id === noteId);
            if (!note) return;

            const updatedSubItems = [...note.subItems];
            updatedSubItems[index].concluido = !updatedSubItems[index].concluido;

            const allDone = updatedSubItems.length > 0 && updatedSubItems.every(s => s.concluido);

            if (allDone) celebrate();

            try {
                const docRef = doc(db, "kivo_tasks", noteId);
                await updateDoc(docRef, {
                    subItems: updatedSubItems,
                    concluida: allDone,
                    data_conclusao: allDone ? formatarData() : null
                });
            } catch(e) {
                alert("Erro ao marcar tarefa: " + e.message);
            }
        }

        function shareNote(id) {
            const note = currentNotes.find(n => n.id === id);
            if (!note) return;

            const shareUrl = `${window.location.origin}${window.location.pathname}?noteId=${note.id}`;
            let msg = `*Kivo Notes - Tarefa Compartilhada*\n`;
            msg += `📌 *Tema:* ${note.theme}\n\n`;
            note.subItems.forEach(s => {
                msg += s.concluido ? `✅ ~${s.texto}~\n` : `⬜ ${s.texto}\n`;
            });
            msg += `\nAcesse para colaborar:\n${shareUrl}`;

            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function celebrate() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let pieces = [];
            const colors = ['#f7d05c', '#ff6b6b', '#54a0ff', '#3498db', '#25D366'];
            for (let i = 0; i < 150; i++) {
                pieces.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
                    rotation: Math.random() * 360, speed: 5 + Math.random() * 7,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    width: 10 + Math.random() * 6, height: 18 + Math.random() * 5
                });
            }
            function update() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                pieces.forEach(p => {
                    p.y += p.speed; p.rotation += 3;
                    if (p.y < canvas.height) alive = true;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.fillRect(-p.width/2, -p.height/2, p.width, p.height);
                    ctx.restore();
                });
                if (alive) requestAnimationFrame(update);
            }
            update();
        }

        function openModal(isEdit = false, id = null) {
            editingNoteId = id; tempSubtasks = [];
            document.getElementById('themeInput').value = '';
            document.getElementById('subtasksSetupList').innerHTML = '';
            
            if (isEdit) {
                document.getElementById('modalTitle').innerText = "Editar Nota";
                const note = currentNotes.find(n => n.id === id);
                document.getElementById('themeInput').value = note.theme;
                tempSubtasks = [...note.subItems];
                selectedColor = note.color || '#fff7d6';
                document.querySelectorAll('.color-swatch').forEach(s => {
                    s.classList.remove('selected');
                    if(s.getAttribute('data-color') === selectedColor) s.classList.add('selected');
                });
                renderTempSubtasks();
            } else {
                document.getElementById('modalTitle').innerText = "Nova Nota";
            }
            document.getElementById('noteModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('noteModal').style.display = 'none'; editingNoteId = null; }
        
        function addTempSubtask() {
            const input = document.getElementById('subtaskInput');
            const txt = input.value.trim();
            if (txt === '') return;
            tempSubtasks.push({ texto: txt, concluido: false });
            input.value = '';
            renderTempSubtasks();
        }

        // FUNÇÃO ATUALIZADA: Adiciona botão de excluir individual (❌) em cada subtítulo no modal de edição
        function renderTempSubtasks() {
            const container = document.getElementById('subtasksSetupList');
            container.innerHTML = '';
            tempSubtasks.forEach((s, idx) => {
                const d = document.createElement('div');
                d.className = 'setup-subtask-item';
                d.innerHTML = `
                    <span>▪ ${s.texto}</span>
                    <span class="delete-temp-btn" data-index="${idx}">❌</span>
                `;
                container.appendChild(d);
            });

            // Adiciona a ação de clique para remover o item do array temporário
            container.querySelectorAll('.delete-temp-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    tempSubtasks.splice(idx, 1);
                    renderTempSubtasks();
                };
            });
        }

        async function saveNote(e) {
            e.preventDefault();
            const theme = document.getElementById('themeInput').value.trim();
            if (theme === '') return;

            if (!loggedUser && !isSharedMode) {
                alert("Aguarde um momento conectando ao servidor, ou certifique-se de ter ativado a Autenticação Anônima no Firebase!");
                return;
            }

            try {
                const novaOrdem = currentNotes.length > 0 ? Math.max(...currentNotes.map(n => n.ordem || 0)) + 1 : 0;

                if (editingNoteId) {
                    const docRef = doc(db, "kivo_tasks", editingNoteId);
                    await updateDoc(docRef, { 
                        theme: theme, 
                        color: selectedColor, 
                        subItems: tempSubtasks, 
                        concluida: tempSubtasks.length > 0 && tempSubtasks.every(s => s.concluido) 
                    });
                } else {
                    const newId = Date.now().toString();
                    const docRef = doc(db, "kivo_tasks", newId);
                    await setDoc(docRef, { 
                        theme: theme, 
                        color: selectedColor, 
                        subItems: tempSubtasks, 
                        concluida: false, 
                        seen: false, 
                        ordem: novaOrdem, 
                        ownerId: loggedUser.uid, 
                        data_criacao: formatarData(), 
                        data_conclusao: null, 
                        timestamp: Date.now() 
                    });
                }
                closeModal(); 
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Ocorreu um erro ao salvar: " + error.message);
            }
        }

        async function deleteNote(id) { 
            if (confirm('Excluir esta nota permanentemente?')) {
                try {
                    await deleteDoc(doc(db, "kivo_tasks", id)); 
                } catch(e) {
                    alert("Erro ao excluir: " + e.message);
                }
            }
        }

        document.getElementById('openCreateBtn').onclick = () => openModal(false);
        document.getElementById('closeModalBtn').onclick = closeModal;
        document.getElementById('addSubtaskBtn').onclick = addTempSubtask;
        document.getElementById('saveNoteBtn').onclick = saveNote;
    </script>
</body>
</html>
